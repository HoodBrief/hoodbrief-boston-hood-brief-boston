<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hood Brief Boston">
<meta name="theme-color" content="#06080f">
<title>Hood Brief Boston</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
:root {
  --bg:          #06080f;
  --surface:     #0c1018;
  --surface2:    #121820;
  --surface3:    #1a2230;
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.13);
  --text:        #e2e8f4;
  --text2:       #a0b0c8;
  --text3:       #6b7d96;
  --gold:        #f5c842;
  --gold-dim:    rgba(245,200,66,0.12);
  --gold-bdr:    rgba(245,200,66,0.28);
  --red:         #ff3d4f;
  --red-dim:     rgba(255,61,79,0.12);
  --red-bdr:     rgba(255,61,79,0.28);
  --amber:       #f59e0b;
  --amber-dim:   rgba(245,158,11,0.12);
  --amber-bdr:   rgba(245,158,11,0.28);
  --green:       #10d98a;
  --green-dim:   rgba(16,217,138,0.10);
  --green-bdr:   rgba(16,217,138,0.22);
  --blue:        #3d9eff;
  --blue-dim:    rgba(61,158,255,0.10);
  --blue-bdr:    rgba(61,158,255,0.22);
  --gang:        #ff6b1a;
  --gang-dim:    rgba(255,107,26,0.12);
  --gang-bdr:    rgba(255,107,26,0.30);
  --teal:        #14b8a6;
  --teal-dim:    rgba(20,184,166,0.12);
  --teal-bdr:    rgba(20,184,166,0.30);
  --lime:        #bef264;
  --lime-dim:    rgba(190,242,100,0.10);
  --lime-bdr:    rgba(190,242,100,0.28);
  --boston:      #3d9eff;
  --font:        'Space Grotesk', sans-serif;
  --mono:        'Space Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-tap-highlight-color:transparent;}

/* HEADER */
#header{display:flex;align-items:center;gap:7px;padding:0 10px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:300;position:relative;}
.logo-hood{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-0.5px;}
.logo-brief{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-0.5px;}
.logo-city{font-size:18px;font-weight:700;color:var(--boston);letter-spacing:-0.5px;}
.delayed-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-bdr);padding:3px 8px;border-radius:3px;}
.delayed-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:blink 1.3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.map-btn{padding:4px 8px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;white-space:nowrap;}
.map-btn.active{color:var(--bg);border-color:transparent;}
#district-btn.active{background:var(--gold);}
#heatmap-btn.active{background:var(--red);}
#clock{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all 0.4s;flex-shrink:0;}
#conn-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green);}
#conn-dot.err{background:var(--red);}

/* RADIUS BAR */
#radius-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
#addr-wrap{flex:1;display:flex;flex-direction:column;gap:0;min-width:0;}
#addr-row{display:flex;gap:8px;align-items:center;}
#addr-input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:7px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;min-width:0;}
#addr-input::placeholder{color:var(--text3);}
#addr-input:focus{border-color:var(--gold);}
#search-btn{padding:7px 13px;background:var(--gold);color:var(--bg);border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity 0.15s;}
#search-btn:disabled{opacity:0.4;cursor:not-allowed;}
#clear-btn{padding:7px 10px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;display:none;flex-shrink:0;font-family:var(--font);}
#clear-btn:hover{border-color:var(--red);color:var(--red);}
#clear-btn.visible{display:block;}
#radius-status{font-size:11px;font-family:var(--mono);color:var(--gold);display:none;margin-top:4px;}
#radius-status.visible{display:block;}
#geo-error{font-family:var(--mono);font-size:10px;color:var(--red);display:none;margin-top:4px;}
#geo-error.visible{display:block;}

/* FILTER BAR */
.filter-bar{display:flex;gap:5px;padding:6px 11px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-bar-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;padding-right:6px;flex-shrink:0;border-right:1px solid var(--border2);margin-right:2px;}
.chip{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;white-space:nowrap;cursor:pointer;transition:all 0.13s;flex-shrink:0;}
.chip:active{transform:scale(0.96);}
.chip.active{border-color:transparent;color:var(--bg);}
.chip[data-f="all"].active{background:var(--gold);}
.chip[data-f="p1"].active{background:var(--red);}
.chip[data-f="p2"].active{background:var(--amber);}
.chip[data-f="medical"].active{background:var(--blue);}
.chip[data-f="gang"].active{background:var(--gang);}
.chip[data-f="consulate"].active{background:var(--lime);color:#000;}

/* LAYOUT */
#main{display:flex;overflow:hidden;}
@media(min-width:720px){
  #main{flex-direction:row;height:calc(100dvh - 50px - 52px - 36px);}
  #feed-panel{width:370px;min-width:370px;border-right:1px solid var(--border);}
  #map-panel{flex:1;}
}
@media(max-width:719px){
  #main{flex-direction:column;height:calc(100dvh - 50px - 68px - 36px);}
  #feed-panel{height:48%;border-bottom:1px solid var(--border);}
  #map-panel{flex:1;min-height:0;}
}

/* FEED */
#feed-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#feed-header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;flex-shrink:0;}
#feed-count{color:var(--gold);font-weight:700;}
#feed-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
#feed-scroll::-webkit-scrollbar{width:3px;}
#feed-scroll::-webkit-scrollbar-thumb{background:var(--surface3);}

/* INCIDENT CARD */
.incident{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;position:relative;animation:slideIn 0.25s ease forwards;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.incident::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background 0.15s;}
.incident:hover{background:var(--surface2);}
.incident.selected{background:rgba(245,200,66,0.04);}
.incident.selected::before{background:var(--gold);}
.incident.in-radius{background:rgba(245,200,66,0.03);}
.incident.is-gang::before{background:var(--gang);}
.incident.near-consulate::before{background:var(--lime);}

.inc-row1{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.badge-p1{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bdr);}
.badge-p2{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr);}
.badge-medical{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bdr);}
.badge-p3{background:rgba(107,125,150,0.12);color:var(--text3);border:1px solid rgba(107,125,150,0.25);}
.district-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.gang-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gang);background:var(--gang-dim);border:1px solid var(--gang-bdr);padding:2px 6px;border-radius:2px;flex-shrink:0;}
.consulate-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--lime);background:var(--lime-dim);border:1px solid var(--lime-bdr);padding:2px 6px;border-radius:2px;flex-shrink:0;}
.radius-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-bdr);padding:2px 6px;border-radius:2px;}
.new-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);background:var(--green-dim);border:1px solid var(--green-bdr);padding:2px 6px;border-radius:2px;}
.inc-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;flex-shrink:0;}
.inc-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;}
.inc-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-bottom:3px;}
.inc-gang-zone{font-family:var(--mono);font-size:10px;color:var(--gang);margin-top:4px;padding:3px 7px;background:var(--gang-dim);border-left:2px solid var(--gang);border-radius:0 2px 2px 0;}
.inc-consulate{font-family:var(--mono);font-size:10px;color:var(--lime);margin-top:4px;padding:3px 7px;background:var(--lime-dim);border-left:2px solid var(--lime);border-radius:0 2px 2px 0;}
.state-msg{padding:36px 18px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;line-height:1.8;}
.state-msg .ico{font-size:26px;display:block;margin-bottom:10px;}

/* MAP */
#map-panel{position:relative;}
#map{width:100%;height:100%;}
.leaflet-tile-pane{filter:brightness(1.4) contrast(0.9);}
.leaflet-container{background:#040608;}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;color:var(--text)!important;border:1px solid var(--border2)!important;border-radius:7px!important;box-shadow:0 16px 48px rgba(0,0,0,0.85)!important;font-family:var(--font)!important;}
.leaflet-popup-tip{background:var(--surface2)!important;}
.leaflet-popup-content{margin:13px 15px!important;min-width:210px;}
.leaflet-popup-close-button{color:var(--text2)!important;font-size:16px!important;}
.p-badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-bottom:7px;}
.p-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3;}
.p-row{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;gap:6px;}
.p-row b{color:var(--text);font-weight:500;}
.p-district{font-family:var(--mono);font-size:11px;color:var(--boston);margin-top:6px;padding:4px 8px;background:var(--blue-dim);border-radius:3px;}
.p-gang{font-size:11px;color:var(--gang);font-weight:600;margin-top:6px;padding:5px 8px;background:var(--gang-dim);border:1px solid var(--gang-bdr);border-radius:3px;}
.p-consulate{font-size:11px;color:var(--lime);font-weight:600;margin-top:6px;padding:5px 8px;background:var(--lime-dim);border:1px solid var(--lime-bdr);border-radius:3px;}
.p-dist{font-family:var(--mono);font-size:11px;color:var(--gold);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.district-tooltip{font-family:var(--mono);font-size:10px;font-weight:700;background:rgba(6,8,15,0.85);border:none;color:#e2e8f4;padding:3px 7px;border-radius:3px;letter-spacing:0.5px;}

/* MAP OVERLAYS */
#map-stats{position:absolute;bottom:28px;right:10px;z-index:1000;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.stat-pill{background:rgba(6,8,15,0.88);border:1px solid var(--border2);border-radius:3px;padding:4px 10px;font-family:var(--mono);font-size:10px;letter-spacing:0.5px;color:var(--text2);text-transform:uppercase;}
.stat-pill b{color:var(--gold);}
#radius-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--gold-bdr);border-radius:5px;padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;display:none;pointer-events:none;}
#radius-banner.visible{display:block;}
#heatmap-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--border2);border-radius:5px;padding:8px 12px;display:none;pointer-events:none;}
#heatmap-legend.visible{display:block;}
.heat-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.heat-bar{width:120px;height:8px;border-radius:4px;background:linear-gradient(to right,#0000ff,#00ffff,#00ff00,#ffff00,#ff0000);margin-bottom:4px;}
.heat-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);}
.heat-note{font-size:10px;color:var(--text3);margin-top:6px;font-family:var(--mono);}
#district-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--border2);border-radius:5px;padding:8px 10px;display:none;pointer-events:none;min-width:180px;}
#district-legend.visible{display:block;}
.legend-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);margin-bottom:3px;}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

/* TOAST */
#toast-wrap{position:fixed;top:58px;right:12px;z-index:9000;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:290px;}
.toast{display:flex;align-items:flex-start;gap:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;pointer-events:all;cursor:pointer;animation:tIn 0.25s ease forwards;}
.toast.gang-toast{border-color:var(--gang-bdr);}
.toast.consulate-toast{border-color:var(--lime-bdr);}
.toast.out{animation:tOut 0.25s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(16px)}}
.t-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.t-city{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--boston);margin-bottom:2px;}
.t-title{font-size:13px;font-weight:600;color:var(--text);}
.t-loc{font-size:11px;color:var(--text2);margin-top:2px;}
.t-gang{font-size:10px;color:var(--gang);font-family:var(--mono);margin-top:3px;}

/* BOOT */
#boot-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;}
#boot-overlay.gone{display:none;}
.boot-logo{display:flex;gap:0;}
.boot-logo span:first-child{font-size:32px;font-weight:700;color:var(--gold);}
.boot-logo span:nth-child(2){font-size:32px;font-weight:300;color:var(--text);}
.boot-logo span:last-child{font-size:32px;font-weight:700;color:var(--boston);}
.boot-msg{font-family:var(--mono);font-size:12px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
.spinner{width:32px;height:32px;border:2px solid var(--surface3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text)!important;border-color:var(--border2)!important;}
</style>
</head>
<body>

<div id="boot-overlay">
  <div class="boot-logo"><span>HOOD</span><span> BRIEF </span><span>BOSTON</span></div>
  <div class="spinner"></div>
  <div id="boot-msg" class="boot-msg">Loading incidents…</div>
</div>

<div id="header">
  <span class="logo-hood">HOOD</span>
  <span class="logo-brief"> BRIEF </span>
  <span class="logo-city">BOSTON</span>
  <div class="delayed-badge"><div class="delayed-dot"></div>DELAYED</div>
  <button class="map-btn" id="district-btn" onclick="toggleDistricts()">Districts</button>
  <button class="map-btn" id="heatmap-btn" onclick="toggleHeatmap()">Heat Map</button>
  <div id="conn-dot"></div>
  <div id="clock"></div>
</div>

<div id="radius-bar">
  <div id="addr-wrap">
    <div id="addr-row">
      <input id="addr-input" type="text" placeholder="Search Boston address or neighborhood…" autocomplete="off">
      <button id="search-btn">Search</button>
      <button id="clear-btn">✕ Clear</button>
    </div>
    <div id="radius-status"></div>
    <div id="geo-error">Location not found — try a street address or neighborhood</div>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="filter-bar-label">Priority</span>
  <div class="chip active" data-f="all">All</div>
  <div class="chip" data-f="p1">🔴 P1</div>
  <div class="chip" data-f="p2">🟡 P2</div>
  <div class="chip" data-f="medical">🔵 Medical</div>
  <div class="chip" data-f="p3">⚪ Routine</div>
  <div class="chip" data-f="gang">⚠ Gang Zone</div>
  <div class="chip" data-f="consulate">🏛 Diplomatic</div>
</div>

<div id="main">
  <div id="feed-panel">
    <div id="feed-header">
      <span id="feed-count">0 incidents</span>
      <span id="feed-stats" style="font-size:9px;color:var(--text3)">Gang zones <b id="stat-gang" style="color:var(--gang)">0</b></span>
    </div>
    <div id="feed-scroll"></div>
  </div>
  <div id="map-panel">
    <div id="map"></div>
    <div id="radius-banner"></div>
    <div id="map-stats">
      <div class="stat-pill"><b id="stat-total">0</b> total</div>
      <div class="stat-pill"><b id="stat-p1">0</b> P1</div>
    </div>
    <div id="heatmap-legend">
      <div class="heat-title">Crime Density</div>
      <div class="heat-bar"></div>
      <div class="heat-labels"><span>Low</span><span>High</span></div>
      <div class="heat-note" id="heat-note">6-month rolling window</div>
    </div>
    <div id="district-legend"><div class="legend-title">BPD Districts</div></div>
  </div>
</div>
<div id="toast-wrap"></div>

<script>
/* ── CONFIG ── */

  SUPABASE_URL:      "https://qeycryztfenbycnldmsg.supabase.co",

/* ── SUPABASE ── */
const SB = {

    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

/* ── HELPERS ── */
function haversine(lat1,lng1,lat2,lng2){
  const R=6371e3,p=Math.PI/180;
  const a=Math.sin((lat2-lat1)*p/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lng2-lng1)*p/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtTime(iso){
  if(!iso)return"";
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1)return"just now";
  if(diff<60)return`${diff}m ago`;
  if(diff<1440)return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function getDist(inc){
  if(!S.radiusMode||!S.radiusCenter||!inc.lat||!inc.lng)return null;
  return haversine(S.radiusCenter.lat,S.radiusCenter.lng,inc.lat,inc.lng);
}
function fmtDist(m){return m<1609?`${Math.round(m)}m`:`${(m/1609.34).toFixed(1)}mi`;}
function checkGangProximity(lat,lng){
  for(const z of BOSTON_GANG_ZONES){
    if(haversine(lat,lng,z.lat,z.lng)<GANG_RADIUS_M) return z;
  }
  return null;
}
function getDistrictInfo(inc){
  const d=(inc.district||"").trim().toUpperCase();
  return BPD_DISTRICTS[d]||null;
}

/* ── MAP ── */
function initMap(){
  S.map=L.map("map",{center:CONFIG.CITY.center,zoom:CONFIG.CITY.zoom,zoomControl:false,attributionControl:false});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(S.map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19,pane:"shadowPane"}).addTo(S.map);
  L.control.zoom({position:"bottomright"}).addTo(S.map);
}


async function loadDistrictBoundaries(){
  try{
    const resp=await fetch("https://raw.githubusercontent.com/hoodbrief/hoodbrief-boston-hood-brief-boston/main/police_districts%20(1).geojson");
    if(!resp.ok) throw new Error();
    const geojson=await resp.json();
    S.districtLayer=L.geoJSON(geojson,{
      style:f=>{const d=(f.properties.DISTRICT||"").trim();const i=BPD_DISTRICTS[d]||{};return{color:i.color||"#fff",weight:1.5,opacity:0.7,fillOpacity:0.04,fillColor:i.color||"#fff"};},
      onEachFeature:(f,layer)=>{const d=(f.properties.DISTRICT||"").trim();const i=BPD_DISTRICTS[d]||{name:d};layer.bindTooltip(i.name,{permanent:false,direction:"center",className:"district-tooltip"});}
    });
    const leg=document.getElementById("district-legend");
    Object.entries(BPD_DISTRICTS).forEach(([k,d])=>{const el=document.createElement("div");el.className="legend-item";el.innerHTML=`<div class="legend-swatch" style="background:${d.color}"></div>${d.name}`;leg.appendChild(el);});
  }catch(e){S.districtLayer=null;}
}

async function loadConsulateMarkers(){
  try{
    const cons=await SB.query("boston_consulates?select=*&limit=100");
    cons.forEach(c=>{
      if(!c.lat||!c.lng)return;
      const icon=L.divIcon({className:"",html:`<svg width="12" height="11" viewBox="0 0 12 11"><polygon points="6,0 0,10 12,10" fill="var(--lime)" stroke="rgba(0,0,0,0.3)" stroke-width="1"/></svg>`,iconSize:[12,11],iconAnchor:[6,11]});
      L.marker([parseFloat(c.lat),parseFloat(c.lng)],{icon,zIndexOffset:-100}).addTo(S.map).bindPopup(`
        <div style="font-family:'Space Grotesk',sans-serif;min-width:180px">
          <div class="p-badge" style="background:var(--lime-dim);color:var(--lime);border:1px solid var(--lime-bdr)">🏛 CONSULATE GENERAL</div>
          <div class="p-title">${c.country||""}</div>
          <div class="p-row">📍 <b>${c.address||""}</b></div>
        </div>`);
    });
  }catch(e){console.log("[Consulates]",e.message);}
}

async function loadHeatmap(){

    const pts=await SB.query("boston_heatmap_points?select=lat,lng,weight&limit=5000");
    if(pts.length&&window.L.heatLayer){
      S.heatLayer=L.heatLayer(pts.map(p=>[parseFloat(p.lat),parseFloat(p.lng),p.weight||1]),

      document.getElementById("heat-note").textContent=`${pts.length.toLocaleString()} incidents · 6-month window`;
    }
  }catch(e){console.log("[Heatmap]",e.message);}

  if(S.heatmapVisible) S.heatLayer.addTo(S.map);

/* ── MARKERS ── */
function makeIcon(priority,selected,inRadius,isGang){
  const col=isGang?"#ff6b1a":(PIN_COL[priority]||"#475569"),sz=selected?20:inRadius?16:12;
  const glow=selected?`box-shadow:0 0 14px ${col}90;`:isGang?`box-shadow:0 0 10px ${col}70;`:inRadius?`box-shadow:0 0 8px ${col}60;`:"";
  const bdr=isGang?`border:2px solid #ff6b1a;`:inRadius?`border:2px solid var(--gold);`:`border:2px solid rgba(255,255,255,0.55);`;
  return L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};${bdr}${glow}transition:all 0.2s;"></div>`,iconAnchor:[sz/2,sz/2],iconSize:[sz,sz]});
}
function makeUserIcon(){return L.divIcon({className:"",html:`<div style="width:20px;height:20px;border-radius:50%;background:#f5c842;border:3px solid #fff;box-shadow:0 0 16px rgba(245,200,66,0.8);"></div>`,iconAnchor:[10,10],iconSize:[20,20]});}

function popupHTML(inc){
  const b=BADGE[inc.priority]||BADGE.p3;
  const di=getDistrictInfo(inc);
  const dist=getDist(inc);
  return `
    <div class="p-badge ${b.cls}">${b.label}</div>
    <div class="p-title">${inc.title||inc.offense_desc||"Incident"}</div>
    <div class="p-row">📍 <b>${inc.location||inc.district||"Boston"}</b></div>
    <div class="p-row">🕐 <b>${fmtTime(inc.occurred_on||inc.created_at)}</b></div>
    ${di?`<div class="p-district">🏢 ${di.name}</div>`:""}
    ${inc.gang_hotspot?`<div class="p-gang">⚠ ${inc.gang_zone}</div>`:""}
    ${inc.near_consulate?`<div class="p-consulate">🏛 Near ${inc.consulate_country||"Consulate"}</div>`:""}
    ${dist!==null?`<div class="p-dist">📏 ${fmtDist(dist)} from search location</div>`:""}
  `;
}

function syncMarkers(){
  const visible=getVisible().filter(i=>i.lat&&i.lng).slice(0,200);
  const visibleIds=new Set(visible.map(i=>String(i.id)));
  Object.keys(S.markers).forEach(id=>{if(!visibleIds.has(id)){S.markers[id].remove();delete S.markers[id];}});
  visible.forEach(inc=>{
    const id=String(inc.id);
    const selected=inc.id===S.selectedId,isGang=inc.gang_hotspot===true;
    const icon=makeIcon(inc.priority,selected,S.radiusMode,isGang);
    if(S.markers[id]){S.markers[id].setIcon(icon);S.markers[id].setPopupContent(popupHTML(inc));return;}
    const m=L.marker([inc.lat,inc.lng],{icon}).addTo(S.map).bindPopup(popupHTML(inc),{maxWidth:270}).on("click",()=>selectIncident(inc.id));
    S.markers[id]=m;
  });
}

/* ── FILTER ── */
function getVisible(){
  return S.incidents.filter(inc=>{
    if(S.filter==="p1")    return inc.priority==="p1";
    if(S.filter==="p2")    return inc.priority==="p2";
    if(S.filter==="medical")return inc.priority==="medical";
    if(S.filter==="p3")    return inc.priority==="p3";
    if(S.filter==="gang")  return inc.gang_hotspot===true;
    if(S.filter==="consulate")return inc.near_consulate===true;
    if(S.radiusCenter&&inc.lat&&inc.lng){
      if(haversine(S.radiusCenter.lat,S.radiusCenter.lng,inc.lat,inc.lng)>CONFIG.RADIUS_MILES*1609.34) return false;
    }
    return true;
  });
}

/* ── RENDER ── */
function renderFeed(){
  const list=getVisible();
  if(S.radiusMode&&S.radiusCenter) list.sort((a,b)=>haversine(S.radiusCenter.lat,S.radiusCenter.lng,a.lat||0,a.lng||0)-haversine(S.radiusCenter.lat,S.radiusCenter.lng,b.lat||0,b.lng||0));
  document.getElementById("feed-count").textContent=`${list.length} incident${list.length!==1?"s":""}`;
  document.getElementById("stat-gang").textContent=S.incidents.filter(i=>i.gang_hotspot===true).length;
  document.getElementById("stat-total").textContent=S.incidents.length;
  document.getElementById("stat-p1").textContent=S.incidents.filter(i=>i.priority==="p1").length;
  const scroll=document.getElementById("feed-scroll");
  if(!list.length){scroll.innerHTML=`<div class="state-msg"><span class="ico">📡</span>No incidents match<br>current filters</div>`;syncMarkers();return;}
  const dist=getDist;
  scroll.innerHTML=list.map(inc=>{
    const b=BADGE[inc.priority]||BADGE.p3;
    const sel=inc.id===S.selectedId?" selected":"";
    const inR=S.radiusMode?" in-radius":"";
    const gangCls=inc.gang_hotspot?" is-gang":"";
    const consCls=inc.near_consulate?" near-consulate":"";
    const di=getDistrictInfo(inc);
    const d=getDist(inc);
    return `<div class="incident${sel}${inR}${gangCls}${consCls}" data-id="${inc.id}">
      <div class="inc-row1">
        <span class="badge ${b.cls}">${b.label}</span>
        ${di?`<span class="district-tag" style="color:${di.color};background:${di.color}20;border:1px solid ${di.color}40">${di.name.split("—")[0].trim()}</span>`:""}
        ${inc.gang_hotspot?`<span class="gang-tag">⚠ Gang</span>`:""}
        ${inc.near_consulate?`<span class="consulate-tag">🏛</span>`:""}
        ${S.radiusMode&&d!==null?`<span class="radius-tag">📏 ${fmtDist(d)}</span>`:""}
        <span class="inc-time">${fmtTime(inc.occurred_on||inc.created_at)}</span>
      </div>
      <div class="inc-title">${inc.title||inc.offense_desc||"Incident"}</div>
      <div class="inc-loc"><svg width="9" height="11" viewBox="0 0 9 11" fill="none"><path d="M4.5 0C2.01 0 0 2.01 0 4.5C0 7.875 4.5 11 4.5 11C4.5 11 9 7.875 9 4.5C9 2.01 6.99 0 4.5 0Z" fill="currentColor" opacity="0.5"/></svg>${inc.location||inc.district||"Boston"}</div>
      ${inc.gang_hotspot&&inc.gang_zone?`<div class="inc-gang-zone">⚠ ${inc.gang_zone}</div>`:""}
      ${inc.near_consulate?`<div class="inc-consulate">🏛 Near ${inc.consulate_country||"Diplomatic Facility"}</div>`:""}
    </div>`;
  }).join("");
  scroll.querySelectorAll(".incident").forEach(el=>el.addEventListener("click",()=>selectIncident(el.dataset.id)));
  syncMarkers();
}

function selectIncident(id){
  S.selectedId=id;
  const inc=S.incidents.find(i=>String(i.id)===String(id));
  if(inc?.lat&&inc?.lng){S.map.flyTo([inc.lat,inc.lng],16,{duration:0.75});setTimeout(()=>S.markers[String(id)]?.openPopup(),800);}
  renderFeed();
  document.querySelector(`.incident[data-id="${id}"]`)?.scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ── SEARCH ── */
async function doRadiusSearch(){
  const addr=document.getElementById("addr-input").value.trim();if(!addr)return;
  const btn=document.getElementById("search-btn"),errEl=document.getElementById("geo-error"),statEl=document.getElementById("radius-status");
  btn.disabled=true;btn.textContent="Searching…";errEl.classList.remove("visible");statEl.classList.remove("visible");
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr+", Boston MA")}&limit=1&countrycodes=us`);
    const res=await r.json();
    if(!res.length)throw new Error("Not found");
    const geo={lat:parseFloat(res[0].lat),lng:parseFloat(res[0].lon),label:res[0].display_name};
    S.radiusCenter=geo;S.radiusMode=true;
    if(S.radiusCircle)S.radiusCircle.remove();
    S.radiusCircle=L.circle([geo.lat,geo.lng],{radius:CONFIG.RADIUS_MILES*1609.34,color:"#f5c842",weight:1.5,opacity:0.7,fillColor:"#f5c842",fillOpacity:0.06}).addTo(S.map);
    if(S.userMarker)S.userMarker.remove();
    S.userMarker=L.marker([geo.lat,geo.lng],{icon:makeUserIcon(),zIndexOffset:1000}).addTo(S.map);
    S.map.fitBounds(S.radiusCircle.getBounds(),{padding:[20,20]});
    document.getElementById("clear-btn").classList.add("visible");
    const count=getVisible().length;
    statEl.textContent=`${count} incident${count!==1?"s":""} within ${CONFIG.RADIUS_MILES} miles`;
    statEl.classList.add("visible");renderFeed();
  }catch(err){errEl.classList.add("visible");}
  finally{btn.disabled=false;btn.textContent="Search";}
}

function clearRadiusSearch(){
  S.radiusMode=false;S.radiusCenter=null;
  if(S.radiusCircle){S.radiusCircle.remove();S.radiusCircle=null;}
  if(S.userMarker){S.userMarker.remove();S.userMarker=null;}
  document.getElementById("addr-input").value="";
  document.getElementById("clear-btn").classList.remove("visible");
  document.getElementById("radius-status").classList.remove("visible");
  document.getElementById("geo-error").classList.remove("visible");
  S.map.flyTo(CONFIG.CITY.center,CONFIG.CITY.zoom,{duration:0.8});
  renderFeed();
}

/* ── EVENTS ── */
document.getElementById("filter-bar").addEventListener("click",e=>{
  const chip=e.target.closest(".chip");if(!chip)return;
  S.filter=chip.dataset.f;
  document.querySelectorAll("#filter-bar .chip").forEach(c=>c.classList.toggle("active",c===chip));
  renderFeed();
});
document.getElementById("search-btn").addEventListener("click",doRadiusSearch);
document.getElementById("clear-btn").addEventListener("click",clearRadiusSearch);
document.getElementById("addr-input").addEventListener("keydown",e=>{if(e.key==="Enter")doRadiusSearch();});

/* ── CLOCK ── */
function setConn(ok){document.getElementById("conn-dot").className=ok?"ok":"err";}
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});},1000);

/* ── BOOT ── */
async function boot(){
  initMap();
  loadDistrictBoundaries();
  loadConsulateMarkers();
  loadHeatmap();
  setConn(false);
  if(CONFIG.SUPABASE_URL.includes("YOUR_")){
    document.getElementById("boot-msg").innerHTML=`<span style="color:var(--red)">Add Supabase URL and key to CONFIG</span>`;
    document.querySelector(".spinner").style.display="none";return;
  }
  try{
    document.getElementById("boot-msg").textContent="Loading incidents…";
    const rows=await SB.query(`boston_incidents?select=*&lat=not.is.null&order=occurred_on.desc&limit=${CONFIG.INITIAL_LOAD}`);
    S.incidents=rows.map(i=>{
      const lat=i.lat?parseFloat(i.lat):null,lng=i.lng?parseFloat(i.lng):null;
      const gangZone=lat&&lng?checkGangProximity(lat,lng):null;
      return{...i,lat,lng,gang_hotspot:!!gangZone,gang_zone:gangZone?.name||null};
    });
    setConn(true);
    document.getElementById("boot-overlay").classList.add("gone");
    renderFeed();
  }catch(err){
    document.getElementById("boot-msg").innerHTML=`<span style="color:var(--red)">Failed: ${err.message}</span>`;
    document.querySelector(".spinner").style.display="none";
  }
}
boot();
</script>
