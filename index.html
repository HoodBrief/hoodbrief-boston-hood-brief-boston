<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hood Brief Boston">
<meta name="theme-color" content="#06080f">
<title>Hood Brief Boston</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
:root {
  --bg:       #06080f;
  --surface:  #0c1018;
  --surface2: #121820;
  --surface3: #1a2230;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e2e8f4;
  --text2:    #a0b0c8;
  --text3:    #6b7d96;
  --gold:     #f5c842;
  --gold-dim: rgba(245,200,66,0.12);
  --gold-bdr: rgba(245,200,66,0.28);
  --red:      #ff3d4f;
  --red-dim:  rgba(255,61,79,0.12);
  --red-bdr:  rgba(255,61,79,0.28);
  --amber:    #f59e0b;
  --amber-dim:rgba(245,158,11,0.12);
  --amber-bdr:rgba(245,158,11,0.28);
  --green:    #10d98a;
  --green-dim:rgba(16,217,138,0.10);
  --green-bdr:rgba(16,217,138,0.22);
  --blue:     #3d9eff;
  --blue-dim: rgba(61,158,255,0.10);
  --blue-bdr: rgba(61,158,255,0.22);
  --gang:     #ff6b1a;
  --gang-dim: rgba(255,107,26,0.12);
  --gang-bdr: rgba(255,107,26,0.30);
  --teal:     #14b8a6;
  --teal-dim: rgba(20,184,166,0.12);
  --teal-bdr: rgba(20,184,166,0.30);
  --lime:     #bef264;
  --lime-dim: rgba(190,242,100,0.10);
  --lime-bdr: rgba(190,242,100,0.28);
  --boston:   #3d9eff;
  --font:     'Space Grotesk', sans-serif;
  --mono:     'Space Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-tap-highlight-color:transparent;}

/* HEADER */
#header{display:flex;align-items:center;gap:7px;padding:0 10px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:300;position:relative;}
.logo-hood{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-0.5px;}
.logo-brief{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-0.5px;}
.logo-city{font-size:18px;font-weight:700;color:var(--boston);letter-spacing:-0.5px;}
.delayed-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-bdr);padding:3px 8px;border-radius:3px;}
.delayed-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:blink 1.3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.map-btn{padding:4px 8px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;white-space:nowrap;}
.map-btn.active{color:var(--bg);border-color:transparent;}
#district-btn.active{background:var(--gold);}
#heatmap-btn.active{background:var(--red);}
#clock{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all 0.4s;flex-shrink:0;}
#conn-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green);}
#conn-dot.err{background:var(--red);}

/* RADIUS BAR */
#radius-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
#addr-wrap{flex:1;display:flex;flex-direction:column;gap:0;min-width:0;}
#addr-row{display:flex;gap:8px;align-items:center;}
#addr-input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:7px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;min-width:0;}
#addr-input::placeholder{color:var(--text3);}
#addr-input:focus{border-color:var(--gold);}
#search-btn{padding:7px 13px;background:var(--gold);color:var(--bg);border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
#clear-btn{padding:7px 10px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;display:none;flex-shrink:0;font-family:var(--font);}
#clear-btn:hover{border-color:var(--red);color:var(--red);}
#clear-btn.visible{display:block;}
#radius-status{font-size:11px;font-family:var(--mono);color:var(--gold);display:none;margin-top:4px;}
#radius-status.visible{display:block;}

/* FILTER BARS */
.filter-bar{display:flex;gap:5px;padding:6px 11px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-bar-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;padding-right:6px;flex-shrink:0;border-right:1px solid var(--border2);margin-right:2px;}
.chip{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;white-space:nowrap;cursor:pointer;transition:all 0.13s;flex-shrink:0;}
.chip:active{transform:scale(0.96);}
.chip.active{border-color:transparent;color:var(--bg);}
.chip[data-f="all"].active{background:var(--gold);}
.chip[data-f="p1"].active{background:var(--red);}
.chip[data-f="p2"].active{background:var(--amber);}
.chip[data-f="medical"].active{background:var(--blue);}
.chip[data-f="shooting"].active{background:var(--red);}
.chip[data-f="shots_fired"].active{background:var(--amber);}
.chip[data-f="ckan"].active{background:var(--boston);}
.chip[data-f="medical"].active{background:var(--blue);}
.chip[data-f="gang"].active{background:var(--gang);color:#fff;}
.chip[data-f="consulate"].active{background:var(--lime);color:var(--bg);}
.chip[data-f="p3"].active{background:var(--text3);}

/* LAYOUT */
#main{display:flex;overflow:hidden;}
@media(min-width:720px){
  #main{flex-direction:row;height:calc(100dvh - 50px - 52px - 36px - 36px);}
  #feed-panel{width:370px;min-width:370px;border-right:1px solid var(--border);}
  #map-panel{flex:1;}
}
@media(max-width:719px){
  #main{flex-direction:column;height:calc(100dvh - 50px - 68px - 36px - 36px);}
  #feed-panel{height:48%;border-bottom:1px solid var(--border);}
  #map-panel{flex:1;min-height:0;}
}

/* FEED */
#feed-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#feed-header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;flex-shrink:0;}
#feed-count{color:var(--gold);font-weight:700;}
#feed-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}

/* CARDS */
.incident{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;position:relative;animation:slideIn 0.25s ease forwards;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.incident::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
.incident:hover{background:var(--surface2);}
.incident.selected{background:rgba(245,200,66,0.04);}
.incident.selected::before{background:var(--gold);}
.incident.is-shooting::before{background:var(--red);}
.incident.near-consulate::before{background:var(--lime);}
.inc-row1{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.badge-p1{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bdr);}
.badge-p2{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr);}
.badge-medical{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bdr);}
.badge-p3{background:rgba(107,125,150,0.12);color:var(--text3);border:1px solid rgba(107,125,150,0.25);}
.badge-shooting{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bdr);}
.badge-shots{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr);}
.badge-ckan{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bdr);}
.district-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.consulate-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--lime);background:var(--lime-dim);border:1px solid var(--lime-bdr);padding:2px 6px;border-radius:2px;flex-shrink:0;}
.new-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);background:var(--green-dim);border:1px solid var(--green-bdr);padding:2px 6px;border-radius:2px;}
.inc-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;flex-shrink:0;}
.inc-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;}
.incident.is-shooting .inc-title{color:var(--red);}
.incident.near-consulate .inc-title{color:var(--lime);}
.inc-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-bottom:3px;}
.inc-district{font-family:var(--mono);font-size:10px;color:var(--boston);}
.inc-consulate{font-family:var(--mono);font-size:10px;color:var(--lime);margin-top:4px;padding:3px 7px;background:var(--lime-dim);border-left:2px solid var(--lime);border-radius:0 2px 2px 0;}
.state-msg{padding:36px 18px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;line-height:1.8;}
.state-msg .ico{font-size:26px;display:block;margin-bottom:10px;}

/* MAP */
#map-panel{position:relative;}
#map{width:100%;height:100%;}
.leaflet-tile-pane{filter:brightness(1.5) contrast(0.9);}
.leaflet-container{background:#040608;}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;color:var(--text)!important;border:1px solid var(--border2)!important;border-radius:7px!important;box-shadow:0 16px 48px rgba(0,0,0,0.85)!important;font-family:var(--font)!important;}
.leaflet-popup-tip{background:var(--surface2)!important;}
.leaflet-popup-content{margin:13px 15px!important;min-width:210px;}
.leaflet-popup-close-button{color:var(--text2)!important;font-size:16px!important;}
.p-badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-bottom:7px;}
.p-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3;}
.p-row{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;gap:6px;}
.p-row b{color:var(--text);font-weight:500;}
.p-district{font-family:var(--mono);font-size:11px;color:var(--boston);margin-top:6px;padding:4px 8px;background:var(--blue-dim);border-radius:3px;}
.p-consulate{font-size:11px;color:var(--lime);font-weight:600;margin-top:6px;padding:5px 8px;background:var(--lime-dim);border:1px solid var(--lime-bdr);border-radius:3px;}
.district-tooltip{font-family:var(--mono);font-size:10px;font-weight:700;background:rgba(6,8,15,0.85);border:none;color:#e2e8f4;padding:3px 7px;border-radius:3px;letter-spacing:0.5px;}

/* MAP OVERLAYS */
#map-stats{position:absolute;bottom:28px;right:10px;z-index:1000;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.stat-pill{background:rgba(6,8,15,0.88);border:1px solid var(--border2);border-radius:3px;padding:4px 10px;font-family:var(--mono);font-size:10px;letter-spacing:0.5px;color:var(--text2);text-transform:uppercase;}
.stat-pill b{color:var(--gold);}
#radius-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--gold-bdr);border-radius:5px;padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;display:none;pointer-events:none;}
#radius-banner.visible{display:block;}
#heatmap-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--border2);border-radius:5px;padding:8px 12px;display:none;pointer-events:none;}
#heatmap-legend.visible{display:block;}
.heat-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.heat-bar{width:120px;height:8px;border-radius:4px;background:linear-gradient(to right,#0000ff,#00ffff,#00ff00,#ffff00,#ff0000);margin-bottom:4px;}
.heat-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);}
#district-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--border2);border-radius:5px;padding:8px 10px;display:none;pointer-events:none;min-width:180px;}
#district-legend.visible{display:block;}
.legend-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);margin-bottom:3px;}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

/* TOAST */
#toast-wrap{position:fixed;top:58px;right:12px;z-index:9000;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:290px;}
.toast{display:flex;align-items:flex-start;gap:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;pointer-events:all;cursor:pointer;animation:tIn 0.25s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast.out{animation:tOut 0.28s ease forwards;}
@keyframes tOut{to{opacity:0;transform:translateX(20px)}}
.toast.shooting-toast{border-color:var(--red-bdr);}
.toast.consulate-toast{border-color:var(--lime-bdr);}
.t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.t-city{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--boston);margin-bottom:2px;}
.t-title{font-size:13px;font-weight:600;color:var(--text);}
.t-loc{font-size:11px;color:var(--text2);margin-top:2px;}

/* BOOT */
#boot-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity 0.4s;}
#boot-overlay.gone{opacity:0;pointer-events:none;}
.boot-logo{display:flex;gap:0;letter-spacing:-0.5px;}
.boot-logo span:first-child{font-size:32px;font-weight:700;color:var(--gold);}
.boot-logo span:nth-child(2){font-size:32px;font-weight:300;color:var(--text);}
.boot-logo span:last-child{font-size:32px;font-weight:700;color:var(--boston);}
.boot-sub{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}
.spinner{width:32px;height:32px;border:2px solid var(--surface3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#boot-msg{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px;}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text)!important;border-color:var(--border2)!important;}
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot-overlay">
  <div class="boot-logo"><span>HOOD</span><span> BRIEF </span><span>BOSTON</span></div>
  <div class="boot-sub">Boston Police Department · Open Data</div>
  <div class="spinner"></div>
  <div id="boot-msg">Loading incident data…</div>
</div>

<!-- HEADER -->
<div id="header">
  <span class="logo-hood">HOOD</span>
  <span class="logo-brief"> BRIEF </span>
  <span class="logo-city">BOSTON</span>
  <div class="delayed-badge"><div class="delayed-dot"></div>DELAYED</div>
  <button class="map-btn" id="district-btn">Districts</button>
  <button class="map-btn" id="heatmap-btn">Heat Map</button>
  <div id="conn-dot"></div>
  <div id="clock"></div>
</div>

<!-- SEARCH -->
<div id="radius-bar">
  <div id="addr-wrap">
    <div id="addr-row">
      <input id="addr-input" type="text" placeholder="Search Boston address or neighborhood…" autocomplete="off">
      <button id="search-btn">Search</button>
      <button id="clear-btn">✕ Clear</button>
    </div>
    <div id="radius-status"></div>
  </div>
</div>

<!-- FILTER: PRIORITY -->
<div class="filter-bar" id="priority-bar">
  <span class="filter-bar-label">Priority</span>
  <button class="chip active" data-f="all">All</button>
  <button class="chip" data-f="p1">🔴 P1</button>
  <button class="chip" data-f="p2">🟡 P2</button>
  <button class="chip" data-f="medical">🔵 Medical</button>
  <button class="chip" data-f="p3">⚪ Routine</button>
  <button class="chip" data-f="gang">⚠ Gang Zone</button>
  <button class="chip" data-f="consulate">🏛 Diplomatic</button>
</div>

<!-- FILTER: SOURCE -->
<div class="filter-bar" id="source-bar">
  <span class="filter-bar-label">Source</span>
  <button class="chip active" data-s="all">All</button>
  <button class="chip" data-s="ckan">📋 Crime Reports</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="feed-panel">
    <div id="feed-header">
      <span id="feed-count">0 incidents</span>
      <span id="feed-since" style="font-size:9px;color:var(--text3)"></span>
    </div>
    <div id="feed-scroll"></div>
  </div>
  <div id="map-panel">
    <div id="map"></div>
    <div id="radius-banner"></div>
    <div id="map-stats">
      <div class="stat-pill" id="stat-total"><b>0</b> total</div>
      <div class="stat-pill" id="stat-shootings"><b>0</b> shootings</div>
    </div>
    <div id="heatmap-legend">
      <div class="heat-title">Crime Density</div>
      <div class="heat-bar"></div>
      <div class="heat-labels"><span>Low</span><span>High</span></div>
    </div>
    <div id="district-legend">
      <div class="legend-title">BPD Districts</div>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
/* ── CONFIG ─────────────────────────────────────────────────────────────────── */
const CONFIG = {
  SUPABASE_URL:      "https://qeycryztfenbycnldmsg.supabase.co",
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFleWNyeXp0ZmVuYnljbmxkbXNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTE4NjEsImV4cCI6MjA5MzQ2Nzg2MX0.nO24WQHFCJuzaEJrJBa8R5uvxBMyG_K0Z5Gg1D4V2qk",
  CITY: {center:[42.3601,-71.0589], zoom:12},
  INITIAL_LOAD: 300,

/* ── BOSTON DISTRICTS ────────────────────────────────────────────────────────── */
const BPD_DISTRICTS = {

/* ── SUPABASE ────────────────────────────────────────────────────────────────── */
const SB = {
  async query(path){
    const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${path}`,{
      headers:{"apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`}
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  subscribe(table,cb){
    const ws=new WebSocket(
      `${CONFIG.SUPABASE_URL.replace("https","wss").replace("http","ws")}/realtime/v1/websocket?apikey=${CONFIG.SUPABASE_ANON_KEY}&vsn=1.0.0`
    );
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:`realtime:public:${table}`,event:"phx_join",payload:{},ref:"1"}));
      setConn(true);
    };
    ws.onmessage=e=>{
      const msg=JSON.parse(e.data);
      if(msg.event==="INSERT"&&msg.payload?.record) cb(msg.payload.record);
    };
    ws.onclose=()=>{setConn(false);setTimeout(()=>SB.subscribe(table,cb),5000);};
  }
};

async function loadDistrictBoundaries(){
  try{
    const resp=await fetch("https://raw.githubusercontent.com/hoodbrief/hoodbrief-boston-hood-brief-boston/main/police_districts%20(1).geojson");
    if(!resp.ok) throw new Error("GeoJSON unavailable");
    const geojson=await resp.json();
    S.districtLayer=L.geoJSON(geojson,{
      style:feature=>{
        const d=(feature.properties.DISTRICT||feature.properties.ID||"").trim();
        const info=BPD_DISTRICTS[d]||{};
        return{color:info.color||"#ffffff",weight:1.5,opacity:0.7,fillOpacity:0.04,fillColor:info.color||"#ffffff"};
      },
      onEachFeature:(feature,layer)=>{
        const d=(feature.properties.DISTRICT||feature.properties.ID||"").trim();
        const info=BPD_DISTRICTS[d]||{name:d};
        layer.bindTooltip(info.name,{permanent:false,direction:"center",className:"district-tooltip"});
      }
    });
    // Build legend
    const leg=document.getElementById("district-legend");
    Object.entries(BPD_DISTRICTS).forEach(([k,d])=>{
      const el=document.createElement("div");
      el.className="legend-item";
      el.innerHTML=`<div class="legend-swatch" style="background:${d.color}"></div>${d.name}`;
      leg.appendChild(el);
    });
  }catch(e){
    console.log("[Districts]",e.message);
    // Fallback: label markers
    S.districtLayer=L.layerGroup();
    Object.entries(BPD_DISTRICTS).forEach(([code,d])=>{
      L.marker(d.center,{icon:L.divIcon({className:"",
        html:`<div style="font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:${d.color};background:rgba(6,8,15,0.8);border:1px solid ${d.color}40;padding:2px 5px;border-radius:2px;white-space:nowrap">${code}</div>`,
        iconSize:[null,null],iconAnchor:[0,0]})}).addTo(S.districtLayer);
    });
  }
}

/* ── PINS ────────────────────────────────────────────────────────────────────── */
function makePin(inc,selected){
  const isShooting = inc.source==="shootings"||inc.feed==="shootings";
  const isConsulate = inc.near_consulate;
  const p = inc.priority||"p3";
  const col = isConsulate?"var(--lime)":isShooting?"var(--red)":
    p==="p1"?"var(--red)":p==="p2"?"var(--amber)":
    p==="medical"?"var(--blue)":"#475569";
  const sz=selected?18:10;
  const glow=selected?`box-shadow:0 0 12px ${col};`:"";
  return L.divIcon({className:"",
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:1.5px solid rgba(255,255,255,0.35);${glow}transition:all 0.2s"></div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
}

/* ── TIME ────────────────────────────────────────────────────────────────────── */
function timeAgo(iso){
  if(!iso) return "";
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1) return "just now";
  if(diff<60) return `${diff}m ago`;
  if(diff<1440) return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

/* ── DISTRICT LOOKUP ─────────────────────────────────────────────────────────── */
function getDistrictInfo(inc){
  const d=(inc.district||"").trim().toUpperCase();
  return BPD_DISTRICTS[d]||null;
}

/* ── FILTER ──────────────────────────────────────────────────────────────────── */
function getVisible(){
  return S.incidents.filter(inc=>{
    // Priority filter
    if(S.filterP!=="all"){
      if(S.filterP==="shooting" && inc.source!=="shootings" && inc.feed!=="shootings") return false;
      if(S.filterP==="shots_fired" && inc.source!=="shots_fired" && inc.feed!=="shots_fired") return false;
      if(S.filterP==="gang" && !inc.near_gang) return false;
    if(S.filterP==="consulate" && !inc.near_consulate) return false;
      if(S.filterP==="p1"&&inc.priority!=="p1") return false;
      if(S.filterP==="p2"&&inc.priority!=="p2") return false;
      if(S.filterP==="p3"&&inc.priority!=="p3") return false;
    }
    // Source filter
    if(S.filterS!=="all"){
      const src=inc.source||inc.feed||inc.city||"";
      if(S.filterS==="shootings" && !["shootings"].includes(src)) return false;
      if(S.filterS==="shots_fired" && !["shots_fired"].includes(src)) return false;
      if(S.filterS==="ckan" && !["ckan","boston_incidents"].includes(src)) return false;
    }
    // Radius filter
    if(S.radiusCenter&&inc.lat&&inc.lng){
      const d=S.map.distance(S.radiusCenter,[inc.lat,inc.lng]);
      if(d>CONFIG.RADIUS_MILES*1609.34) return false;
    }
    return true;
  });
}

/* ── RENDER ──────────────────────────────────────────────────────────────────── */
function renderFeed(){
  const visible=getVisible();
  document.getElementById("feed-count").textContent=`${visible.length} incident${visible.length!==1?"s":""}`;
  updateStats();
  const scroll=document.getElementById("feed-scroll");
  if(!visible.length){
    scroll.innerHTML=`<div class="state-msg"><span class="ico">📡</span>No incidents match current filters</div>`;
    syncMarkers([]);return;
  }
  scroll.innerHTML=visible.map(inc=>{
    const sel=inc.id===S.selectedId?" selected":"";
    const isShooting=inc.source==="shootings"||inc.feed==="shootings"?" is-shooting":"";
    const isCons=inc.near_consulate?" near-consulate":"";
    const di=getDistrictInfo(inc);
    const src=inc.source||inc.feed||inc.city||"";
    const badgeClass=src==="shootings"?"badge-shooting":src==="shots_fired"?"badge-shots":
      inc.priority==="p1"?"badge-p1":inc.priority==="p2"?"badge-p2":
      inc.priority==="medical"?"badge-medical":"badge-p3";
    const badgeLabel=src==="shootings"?"SHOOTING":src==="shots_fired"?"SHOTS FIRED":
      inc.priority==="p1"?"PRIORITY 1":inc.priority==="p2"?"PRIORITY 2":
      inc.priority==="medical"?"MEDICAL":"ROUTINE";
    const locIcon=src==="shots_fired"?"🔫":"📍";
    return `<div class="incident${sel}${isShooting}${isCons}" data-id="${inc.id}">
      <div class="inc-row1">
        <span class="badge ${badgeClass}">${badgeLabel}</span>
        ${di?`<span class="district-tag" style="background:${di.color}20;color:${di.color};border:1px solid ${di.color}40">${di.name.split("—")[0].trim()}</span>`:""}
        ${inc.near_consulate?`<span class="consulate-tag">🏛 DIPLOMATIC</span>`:""}
        <span class="inc-time">${timeAgo(inc.occurred_on||inc.created_at||inc.occurred_at)}</span>
      </div>
      <div class="inc-title">${inc.title||inc.offense_desc||"Incident"}</div>
      <div class="inc-loc">${locIcon} ${inc.location||inc.street||inc.district||""}</div>
      ${inc.near_consulate?`<div class="inc-consulate">🏛 Near ${inc.consulate_country||"Diplomatic Facility"}</div>`:""}
    </div>`;
  }).join("");
  scroll.querySelectorAll(".incident[data-id]").forEach(el=>{
    el.addEventListener("click",()=>selectIncident(el.dataset.id));
  });
  syncMarkers(visible);
}

function syncMarkers(visible){
  // Don't map shots_fired — district-level only
  const mappable=visible.filter(i=>(i.source!=="shots_fired"&&i.feed!=="shots_fired"&&i.city!=="shots_fired")&&i.lat&&i.lng);
  const ids=new Set(mappable.map(i=>String(i.id)));
  Object.keys(S.markers).forEach(id=>{if(!ids.has(id)){S.map.removeLayer(S.markers[id]);delete S.markers[id];}});
  mappable.forEach(inc=>{
    const key=String(inc.id);
    const sel=inc.id===S.selectedId;
    const icon=makePin(inc,sel);
    if(S.markers[key]){S.markers[key].setIcon(icon);}
    else{
      const m=L.marker([inc.lat,inc.lng],{icon}).addTo(S.map);
      const di=getDistrictInfo(inc);
      const col=inc.priority==="p1"?"var(--red)":inc.priority==="p2"?"var(--amber)":inc.priority==="medical"?"var(--blue)":"#475569";
      m.bindPopup(`<div style="font-family:'Space Grotesk',sans-serif;min-width:200px">
        <span class="p-badge" style="background:${col}20;color:${col};border:1px solid ${col}40">${inc.priority?.toUpperCase()||"ROUTINE"}</span>
        <div class="p-title">${inc.title||inc.offense_desc||"Incident"}</div>
        <div class="p-row">📍 <b>${inc.location||inc.street||inc.district||""}</b></div>
        ${di?`<div class="p-district">🏢 ${di.name}</div>`:""}
        ${inc.near_consulate?`<div class="p-consulate">🏛 Near ${inc.consulate_country||"Consulate"}</div>`:""}
        <div class="p-row" style="margin-top:6px;color:var(--text3);font-family:'Space Mono',monospace;font-size:10px">${timeAgo(inc.occurred_on||inc.created_at||inc.occurred_at)}</div>
      </div>`);
      m.on("click",()=>selectIncident(inc.id));
      S.markers[key]=m;
    }
  });
}

function selectIncident(id){
  S.selectedId=id;
  const inc=S.incidents.find(i=>String(i.id)===String(id));
  if(inc?.lat&&inc?.lng){S.map.flyTo([inc.lat,inc.lng],16,{animate:true,duration:0.6});S.markers[String(id)]?.openPopup();}
  renderFeed();
  setTimeout(()=>{document.querySelector(`.incident[data-id="${id}"]`)?.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
}

function updateStats(){
  const all=S.incidents;
  document.getElementById("stat-total").innerHTML=`<b>${all.length}</b> total`;
  const p1=all.filter(i=>i.priority==="p1").length;
  document.getElementById("stat-shootings").innerHTML=`<b>${p1}</b> priority 1`;
}

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
function showToast(inc){
  const isShooting=inc.source==="shootings"||inc.feed==="shootings";
  const col=isShooting?"var(--red)":inc.priority==="p1"?"var(--red)":inc.priority==="p2"?"var(--amber)":"var(--text3)";
  const el=document.createElement("div");
  el.className=`toast${isShooting?" shooting-toast":""}${inc.near_consulate?" consulate-toast":""}`;
  el.innerHTML=`<div class="t-dot" style="background:${col}"></div>
    <div style="flex:1">
      <div class="t-city">Boston, MA</div>
      <div class="t-title">${inc.title||inc.offense_desc||"Incident"}</div>
      <div class="t-loc">${inc.location||inc.district||""}</div>
    </div>`;
  el.addEventListener("click",()=>{selectIncident(inc.id);dismiss(el);});
  document.getElementById("toast-wrap").prepend(el);
  const wrap=document.getElementById("toast-wrap");
  while(wrap.children.length>4) wrap.lastChild.remove();
  setTimeout(()=>dismiss(el),isShooting?10000:7000);
}
function dismiss(el){el.classList.add("out");setTimeout(()=>el.remove(),280);}

/* ── DISTRICT TOGGLE ─────────────────────────────────────────────────────────── */
document.getElementById("district-btn").addEventListener("click",()=>{
  const btn=document.getElementById("district-btn");
  const leg=document.getElementById("district-legend");
  btn.classList.toggle("active");
  if(!S.districtLayer) return;
  if(btn.classList.contains("active")){S.districtLayer.addTo(S.map);leg.classList.add("visible");}
  else{S.map.removeLayer(S.districtLayer);leg.classList.remove("visible");}
});

/* ── HEATMAP ─────────────────────────────────────────────────────────────────── */
document.getElementById("heatmap-btn").addEventListener("click",async()=>{
  const btn=document.getElementById("heatmap-btn");
  const leg=document.getElementById("heatmap-legend");
  btn.classList.toggle("active");
  if(btn.classList.contains("active")){
    if(!S.heatLayer){
      try{
        const pts=await SB.query("boston_heatmap_points?select=lat,lng,weight&limit=5000");
        if(pts.length&&window.L.heatLayer){
          S.heatLayer=L.heatLayer(pts.map(p=>[parseFloat(p.lat),parseFloat(p.lng),p.weight||1]),
            {radius:20,blur:25,maxZoom:17,gradient:{0.3:"#1d4ed8",0.5:"#f59e0b",0.75:"#ef4444",1:"#fff"}}).addTo(S.map);
          leg.classList.add("visible");
        }
      }catch(e){btn.classList.remove("active");}
    } else {S.heatLayer.addTo(S.map);leg.classList.add("visible");}
  } else {
    if(S.heatLayer) S.map.removeLayer(S.heatLayer);
    leg.classList.remove("visible");
  }
});

/* ── SEARCH ──────────────────────────────────────────────────────────────────── */
async function doSearch(){
  const q=document.getElementById("addr-input").value.trim();
  if(!q) return;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+", Boston Massachusetts")}&limit=1`);
    const res=await r.json();
    if(!res.length){alert("Location not found");return;}
    const {lat,lon,display_name}=res[0];
    S.radiusCenter=[parseFloat(lat),parseFloat(lon)];
    S.radiusMode=true;
    if(S.radiusCircle) S.map.removeLayer(S.radiusCircle);
    if(S.userMarker) S.map.removeLayer(S.userMarker);
    S.radiusCircle=L.circle(S.radiusCenter,{radius:CONFIG.RADIUS_MILES*1609.34,color:"var(--gold)",fillOpacity:0.05,weight:1.5}).addTo(S.map);
    S.userMarker=L.marker(S.radiusCenter,{icon:L.divIcon({className:"",
      html:`<div style="width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid #fff;box-shadow:0 0 8px rgba(245,200,66,0.6)"></div>`,
      iconSize:[12,12],iconAnchor:[6,6]})}).addTo(S.map);
    S.map.flyTo(S.radiusCenter,14);
    document.getElementById("clear-btn").classList.add("visible");
    const count=getVisible().length;
    document.getElementById("radius-status").textContent=`${count} incidents within ${CONFIG.RADIUS_MILES}mi of "${display_name.split(",")[0]}"`;
    document.getElementById("radius-status").classList.add("visible");
    document.getElementById("radius-banner").textContent=`📍 ${CONFIG.RADIUS_MILES}mi radius — ${count} incidents`;
    document.getElementById("radius-banner").classList.add("visible");
    renderFeed();
  }catch(e){console.error(e);}
}

document.getElementById("search-btn").addEventListener("click",doSearch);
document.getElementById("addr-input").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
document.getElementById("clear-btn").addEventListener("click",()=>{
  S.radiusMode=false;S.radiusCenter=null;
  if(S.radiusCircle){S.map.removeLayer(S.radiusCircle);S.radiusCircle=null;}
  if(S.userMarker){S.map.removeLayer(S.userMarker);S.userMarker=null;}
  document.getElementById("addr-input").value="";
  document.getElementById("clear-btn").classList.remove("visible");
  document.getElementById("radius-status").classList.remove("visible");
  document.getElementById("radius-banner").classList.remove("visible");
  S.map.flyTo(CONFIG.CITY.center,CONFIG.CITY.zoom,{duration:0.8});
  renderFeed();
});

/* ── FILTER CHIPS ────────────────────────────────────────────────────────────── */
document.getElementById("priority-bar").addEventListener("click",e=>{
  const chip=e.target.closest(".chip[data-f]");if(!chip) return;
  document.querySelectorAll("#priority-bar .chip").forEach(c=>c.classList.toggle("active",c===chip));
  S.filterP=chip.dataset.f;renderFeed();
});
document.getElementById("source-bar").addEventListener("click",e=>{
  const chip=e.target.closest(".chip[data-s]");if(!chip) return;
  document.querySelectorAll("#source-bar .chip").forEach(c=>c.classList.toggle("active",c===chip));
  S.filterS=chip.dataset.s;renderFeed();
});

/* ── CLOCK ───────────────────────────────────────────────────────────────────── */
function setConn(ok){document.getElementById("conn-dot").className=ok?"ok":"err";}
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});},1000);

/* ── DATA LOADING ────────────────────────────────────────────────────────────── */
async function loadAllData(){
  const allRows=[];
  const tables=[
    {table:"boston_shootings",   source:"shootings",  orderBy:"occurred_on.desc", limit:200},
    {table:"boston_shots_fired", source:"shots_fired", orderBy:"occurred_on.desc", limit:500},
    {table:"boston_incidents",   source:"ckan",        orderBy:"occurred_on.desc", limit:300},
  ];
  for(const t of tables){
    try{
      const rows=await SB.query(`${t.table}?select=*&order=${t.orderBy}&limit=${t.limit}`);
      rows.forEach(r=>{
        r.lat=r.lat?parseFloat(r.lat):null;
        r.lng=r.lng?parseFloat(r.lng):null;
        r.source=t.source;
        // Normalize fields
        if(t.source==="shootings"){
          r.title=r.fatal?"🔴 Fatal Shooting":"Shooting — Victim Shot";
          r.location=r.district||"Boston";
          r.priority="p1";
        } else if(t.source==="shots_fired"){
          r.title="🔫 Shots Fired — No Victim";
          r.location=`District ${r.district||"Unknown"} — no street address`;
          r.priority="p1";
        } else {
          r.title=r.offense_desc||"Crime Incident";
          r.location=r.street||(r.district?`District ${r.district}`:"Boston");
          r.priority=r.shooting?"p1":"p3";
        }
      });
      allRows.push(...rows);
    }catch(e){console.log(`[Data] ${t.table}:`,e.message);}
  }
  // Sort by date desc, deduplicate
  const seen=new Set();
  S.incidents=allRows
    .filter(r=>{const k=`${r.source}-${r.id||r.incident_id||r.incident_number}`;if(seen.has(k))return false;seen.add(k);return true;})
    .sort((a,b)=>new Date(b.occurred_on||b.created_at||0)-new Date(a.occurred_on||a.created_at||0))
    .slice(0,CONFIG.INITIAL_LOAD);
}

/* ── BOOT ────────────────────────────────────────────────────────────────────── */
async function boot(){
  initMap();
  await loadDistrictBoundaries();
  loadGangZoneMarkers();
  await loadConsulateMarkers();
  try{
    await loadAllData();
    document.getElementById("boot-overlay").classList.add("gone");
    renderFeed();
  }catch(err){
    document.getElementById("boot-msg").innerHTML=`<span style="color:var(--red)">Error: ${err.message}</span>`;
  }
}
boot();
</script>
