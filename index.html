<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hood Brief Boston">
<meta name="theme-color" content="#06080f">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: wss: data: blob:;">
<title>Hood Brief Boston</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
:root {
  --bg:       #06080f;
  --surface:  #0c1018;
  --surface2: #121820;
  --surface3: #1a2230;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e2e8f4;
  --text2:    #a0b0c8;
  --text3:    #6b7d96;
  --gold:     #f5c842;
  --gold-dim: rgba(245,200,66,0.12);
  --gold-bdr: rgba(245,200,66,0.28);
  --red:      #ff3d4f;
  --red-dim:  rgba(255,61,79,0.12);
  --red-bdr:  rgba(255,61,79,0.28);
  --amber:    #f59e0b;
  --amber-dim:rgba(245,158,11,0.12);
  --amber-bdr:rgba(245,158,11,0.28);
  --green:    #10d98a;
  --green-dim:rgba(16,217,138,0.10);
  --green-bdr:rgba(16,217,138,0.22);
  --blue:     #3d9eff;
  --blue-dim: rgba(61,158,255,0.10);
  --blue-bdr: rgba(61,158,255,0.22);
  --gang:     #ff6b1a;
  --gang-dim: rgba(255,107,26,0.12);
  --gang-bdr: rgba(255,107,26,0.30);
  --teal:     #14b8a6;
  --teal-dim: rgba(20,184,166,0.12);
  --teal-bdr: rgba(20,184,166,0.30);
  --lime:     #bef264;
  --lime-dim: rgba(190,242,100,0.10);
  --lime-bdr: rgba(190,242,100,0.28);
  --boston:   #3d9eff;
  --font:     'Space Grotesk', sans-serif;
  --mono:     'Space Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-tap-highlight-color:transparent;}

/* HEADER */
#header{display:flex;align-items:center;gap:7px;padding:0 10px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:300;position:relative;}
.logo-hood{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-0.5px;}
.logo-brief{font-size:18px;font-weight:300;color:var(--text);letter-spacing:-0.5px;}
.logo-city{font-size:18px;font-weight:700;color:var(--boston);letter-spacing:-0.5px;}
.delayed-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-bdr);padding:3px 8px;border-radius:3px;}
.delayed-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:blink 1.3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.city-label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--boston);text-transform:uppercase;}
.map-btn{padding:4px 8px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;cursor:pointer;transition:all 0.15s;flex-shrink:0;white-space:nowrap;}
.map-btn.active{color:var(--bg);border-color:transparent;}
#heatmap-btn.active{background:var(--red);}
#monitor-btn.active{background:var(--green);color:var(--bg);}
#monitor-status{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(6,8,15,0.95);border:1px solid var(--green-bdr);border-radius:5px;padding:6px 14px;font-family:var(--mono);font-size:10px;color:var(--green);display:none;pointer-events:none;}
#clock{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all 0.4s;flex-shrink:0;}
#conn-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green);}
#conn-dot.err{background:var(--red);}

/* SEARCH BAR */
#radius-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
#addr-wrap{flex:1;display:flex;flex-direction:column;gap:0;min-width:0;}
#addr-row{display:flex;gap:8px;align-items:center;}
#addr-input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:7px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;min-width:0;}
#addr-input::placeholder{color:var(--text3);}
#addr-input:focus{border-color:var(--gold);}
#search-btn{padding:7px 13px;background:var(--gold);color:var(--bg);border:none;border-radius:5px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
#clear-btn{padding:7px 10px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;display:none;flex-shrink:0;font-family:var(--font);}
#clear-btn:hover{border-color:var(--red);color:var(--red);}
#clear-btn.visible{display:block;}
#radius-status{font-size:11px;font-family:var(--mono);color:var(--gold);display:none;margin-top:4px;}
#radius-status.visible{display:block;}

/* FILTER BARS */
.filter-bar{display:flex;gap:5px;padding:6px 11px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-bar-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;padding-right:6px;flex-shrink:0;border-right:1px solid var(--border2);margin-right:2px;}
.chip{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);color:var(--text2);background:transparent;white-space:nowrap;cursor:pointer;transition:all 0.13s;flex-shrink:0;}
.chip:active{transform:scale(0.96);}
.chip.active{border-color:transparent;color:var(--bg);}
.chip[data-f="all"].active{background:var(--gold);}
.chip[data-f="p1"].active{background:var(--red);}
.chip[data-f="p2"].active{background:var(--amber);}
.chip[data-f="medical"].active{background:var(--blue);}
.chip[data-f="gang"].active{background:var(--gang);}
.chip[data-f="p3"].active{background:var(--text3);color:var(--bg);}
.chip[data-feed].active{background:var(--boston);color:var(--bg);}
.dchip{font-size:9px;padding:4px 9px;}
.dchip.active{color:var(--bg)!important;border-color:transparent!important;}

/* LAYOUT */
#body-wrap{display:flex;flex:1;overflow:hidden;min-height:0;}
#feed-panel{width:370px;min-width:370px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#feed-header{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;flex-shrink:0;}
#feed-count{color:var(--gold);font-weight:700;}
#feed-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* INCIDENT CARDS */
.incident{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;position:relative;animation:slideIn 0.25s ease forwards;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.incident::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background 0.15s;}
.incident:hover{background:var(--surface2);}
.incident.selected{background:rgba(245,200,66,0.04);}
.incident.selected::before{background:var(--gold);}
.incident.is-gang::before{background:var(--gang);}
.incident.near-consulate::before{background:var(--lime);}
.badge{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;flex-shrink:0;}
.badge-p1{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bdr);}
.badge-p2{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr);}
.badge-medical{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bdr);}
.badge-p3{background:rgba(107,125,150,0.12);color:var(--text3);border:1px solid rgba(107,125,150,0.25);}
.badge-feed{background:rgba(61,158,255,0.10);color:var(--blue);border:1px solid rgba(61,158,255,0.22);}
.badge-delayed{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr);font-size:8px;}
.gang-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gang);background:var(--gang-dim);border:1px solid var(--gang-bdr);padding:2px 6px;border-radius:2px;flex-shrink:0;}
.consulate-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--lime);background:var(--lime-dim);border:1px solid var(--lime-bdr);padding:2px 6px;border-radius:2px;flex-shrink:0;}
.radius-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-bdr);padding:2px 6px;border-radius:2px;}
.new-tag{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);background:var(--green-dim);border:1px solid var(--green-bdr);padding:2px 6px;border-radius:2px;}
.inc-time{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;flex-shrink:0;}
.inc-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;}
.incident.is-gang .inc-title{color:var(--gang);}
.incident.near-consulate .inc-title{color:var(--lime);}
.inc-loc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-bottom:3px;}
.inc-unit{font-family:var(--mono);font-size:10px;color:var(--text3);}
.inc-gang-zone{font-family:var(--mono);font-size:10px;color:var(--gang);margin-top:4px;padding:3px 7px;background:var(--gang-dim);border-left:2px solid var(--gang);border-radius:0 2px 2px 0;}
.inc-consulate{font-family:var(--mono);font-size:10px;color:var(--lime);margin-top:4px;padding:3px 7px;background:var(--lime-dim);border-left:2px solid var(--lime);border-radius:0 2px 2px 0;}
.state-msg{padding:36px 18px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;line-height:1.8;}

/* MAP */
.leaflet-container{background:#040608;}
.district-tooltip{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  background:rgba(6,8,15,0.85);border:none;color:#e2e8f4;
  padding:3px 7px;border-radius:3px;letter-spacing:0.5px;
}
#radius-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--gold-bdr);border-radius:5px;padding:6px 14px;font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;display:none;pointer-events:none;}
.stat-pill{background:rgba(6,8,15,0.88);border:1px solid var(--border2);border-radius:3px;padding:4px 10px;font-family:var(--mono);font-size:10px;letter-spacing:0.5px;color:var(--text2);text-transform:uppercase;}
.stat-pill b{color:var(--gold);}
#heatmap-legend{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(6,8,15,0.92);border:1px solid var(--border2);border-radius:5px;padding:8px 12px;display:none;pointer-events:none;}
.heat-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.heat-bar{width:120px;height:8px;border-radius:4px;background:linear-gradient(to right,#0000ff,#00ffff,#00ff00,#ffff00,#ff0000);margin-bottom:4px;}
.heat-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);}
#stats-overlay{position:absolute;bottom:10px;right:10px;z-index:500;display:flex;gap:6px;}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--surface2)!important;color:var(--text)!important;border:1px solid var(--border2)!important;border-radius:7px!important;box-shadow:0 16px 48px rgba(0,0,0,0.85)!important;font-family:var(--font)!important;}
.leaflet-popup-tip{background:var(--surface2)!important;}
.leaflet-popup-close-button{color:var(--text2)!important;font-size:16px!important;}
.p-badge{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-bottom:7px;}
.p-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.3;}
.p-row{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;gap:6px;}
.p-row b{color:var(--text);font-weight:500;}
.p-gang{font-size:11px;color:var(--gang);font-weight:600;margin-top:6px;padding:5px 8px;background:var(--gang-dim);border:1px solid var(--gang-bdr);border-radius:3px;}
.p-consulate{font-size:11px;color:var(--lime);font-weight:600;margin-top:6px;padding:5px 8px;background:var(--lime-dim);border:1px solid var(--lime-bdr);border-radius:3px;}

/* TOAST */
#toast-wrap{position:fixed;top:12px;right:12px;z-index:9000;display:flex;flex-direction:column;gap:7px;pointer-events:none;max-width:310px;}
.toast{display:flex;align-items:flex-start;gap:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;pointer-events:all;cursor:pointer;animation:tIn 0.25s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast.gang-toast{border-color:var(--gang-bdr);}
.toast.consulate-toast{border-color:var(--lime-bdr);}
.t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.t-city{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.t-title{font-size:13px;font-weight:600;color:var(--text);}
.t-loc{font-size:11px;color:var(--text2);margin-top:2px;}

/* BOOT */
#boot-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;}
.boot-logo{display:flex;gap:0;}
.boot-logo span:first-child{font-size:32px;font-weight:700;color:var(--gold);}
.boot-logo span:nth-child(2){font-size:32px;font-weight:300;color:var(--text);}
.boot-logo span:last-child{font-size:32px;font-weight:700;color:var(--boston);}
.boot-msg{font-family:var(--mono);font-size:12px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
.spinner{width:32px;height:32px;border:2px solid var(--surface3);border-top-color:var(--gold);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-control-zoom a{background:var(--surface2)!important;color:var(--text)!important;border-color:var(--border2)!important;}

/* WRAPPER */
#app{display:flex;flex-direction:column;height:100%;}
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot-overlay">
  <div class="boot-logo"><span>HOOD</span><span> BRIEF </span><span>BOSTON</span></div>
  <div class="boot-msg">Boston Police Department · Delayed Feed</div>
  <div class="spinner"></div>

</div>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <span class="logo-hood">HOOD</span>
    <span class="logo-brief">BRIEF</span>

  <!-- SEARCH -->
  <div id="radius-bar">

      <div id="addr-row">
        <input id="addr-input" type="text" placeholder="Search Boston address or neighborhood…" autocomplete="off">

        <button id="clear-btn">✕ Clear</button>
      </div>
      <div id="radius-status"></div>
    </div>
  </div>

  <!-- FILTER: PRIORITY -->
  <div class="filter-bar">
    <span class="filter-bar-label">Priority</span>
    <button class="chip active" data-f="all">All</button>
    <button class="chip" data-f="p1">🔴 P1</button>

    <button class="chip" data-f="medical">🔵 Medical</button>

    <button class="chip active" data-feed="all">All</button>
    <button class="chip" data-feed="bpd_ch3">CH3 Roxbury</button>
    <button class="chip" data-feed="bpd_ch6">CH6 Dorchester</button>
    <button class="chip" data-feed="bpd_ch4">CH4 W.Roxbury</button>
    <button class="chip" data-feed="bpd_ch5">CH5 Back Bay</button>
    <button class="chip" data-feed="bpd_ch2">CH2 Area A</button>
    <button class="chip" data-feed="bpd_ch1">CH1 Special</button>
  </div>

  <!-- BODY -->
  <div id="body-wrap">
    <div id="feed-panel">
      <div id="feed-header">
        <span id="feed-count">0 incidents</span>
        <span id="feed-since" style="font-size:9px"></span>
      </div>
      <div id="feed-scroll"></div>
    </div>
    <div id="map-wrap">
      <div id="map"></div>
      <div id="radius-banner"></div>
      <div id="stats-overlay">
        <div class="stat-pill" id="stat-total"><b>0</b> total</div>
        <div class="stat-pill" id="stat-p1"><b>0</b> p1</div>
        <div class="stat-pill" id="stat-med"><b>0</b> med</div>
      </div>
      <div id="heatmap-legend">
        <div class="heat-title">Crime Density</div>
        <div class="heat-bar"></div>
        <div class="heat-labels"><span>Low</span><span>High</span></div>
      </div>
    </div>
  </div>
</div>
<div id="monitor-status"></div>
<div id="toast-wrap"></div>

<script>

const PRIORITY_LABELS = {p1:"PRIORITY 1",p2:"PRIORITY 2",medical:"MEDICAL",p3:"ROUTINE"};
const PRIORITY_BADGE  = {p1:"badge-p1",p2:"badge-p2",medical:"badge-medical",p3:"badge-p3"};

const S = {
  incidents:[],markers:{},filter:"all",feedFilter:"all",
  selectedId:null,map:null,searchCenter:null,searchCircle:null,
  searchMarker:null,heatLayer:null,consulateMarkers:[],
  newIds:new Set(),
};

// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SB = {
  async query(path){
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  subscribe(cb){
    const ws = new WebSocket(
      `${SUPABASE_URL.replace("https","wss").replace("http","ws")}/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`
    );
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:`realtime:public:${TABLE}`,event:"phx_join",payload:{},ref:"1"}));
      document.getElementById("conn-dot").className="ok";
    };
    ws.onmessage=e=>{
      const msg=JSON.parse(e.data);
      if(msg.event==="INSERT"&&msg.payload?.record) cb(msg.payload.record);
    };
    ws.onclose=()=>{
      document.getElementById("conn-dot").className="err";
      setTimeout(()=>SB.subscribe(cb),5000);
    };
  }
};

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap(){
  S.map=L.map("map",{center:[42.3601,-71.0589],zoom:12,zoomControl:true});
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{
    subdomains:"abcd",maxZoom:19
  }).addTo(S.map);

  setTimeout(()=>{

  },500);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png",{

  }).addTo(S.map);
}

function makePin(priority,selected,isGang,isConsulate){
  const col = isConsulate?"var(--lime)":isGang?"var(--gang)":(PRIORITY_COLORS[priority]||"var(--text3)");
  const sz  = selected?18:10;
  const glow= selected?`box-shadow:0 0 12px ${col};`:"";
  return L.divIcon({
    className:"",
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:1.5px solid rgba(255,255,255,0.35);${glow}transition:all 0.2s;"></div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
  });
}

// ── TIME ──────────────────────────────────────────────────────────────────────
function timeAgo(iso){
  if(!iso) return "";
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1) return "just now";
  if(diff<60) return `${diff}m ago`;
  if(diff<1440) return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function getVisible(){
  return S.incidents.filter(inc=>{
    if(S.filter==="gang" && !inc.gang_hotspot) return false;
    if(S.filter==="consulate" && !inc.near_consulate) return false;
    if(S.filter!=="all"&&S.filter!=="gang"&&S.filter!=="consulate" && inc.priority!==S.filter) return false;
    const feedKey = Object.keys(FEED_LABELS).find(k=>FEED_LABELS[k]===inc.feed) || inc.city;
    if(S.feedFilter!=="all" && feedKey!==S.feedFilter && inc.city!==S.feedFilter) return false;
    if(S.searchCenter){
      const d=S.map.distance(S.searchCenter,[inc.lat,inc.lng]);
      if(d>8047) return false;
    }
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const visible=getVisible();
  document.getElementById("feed-count").textContent=`${visible.length} incident${visible.length!==1?"s":""}`;
  updateStats();

  if(!visible.length){
    document.getElementById("feed-scroll").innerHTML=`<div class="state-msg"><span class="ico">📡</span>No incidents match current filters</div>`;
    syncMarkers([]);
    return;
  }

  document.getElementById("feed-scroll").innerHTML = visible.map(inc=>{
    const sel   = inc.id===S.selectedId?" selected":"";
    const gang  = inc.gang_hotspot?" is-gang":"";
    const cons  = inc.near_consulate?" near-consulate":"";
    const isNew = S.newIds.has(inc.id);
    const pri   = inc.priority||"p3";
    const feedLabel = inc.feed || FEED_LABELS[inc.city] || inc.city || "";
    const feedKey   = Object.keys(FEED_LABELS).find(k=>FEED_LABELS[k]===feedLabel)||inc.city||"";

    return `<div class="incident${sel}${gang}${cons}" data-id="${inc.id}">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap;">
        <span class="badge ${PRIORITY_BADGE[pri]}">${PRIORITY_LABELS[pri]||pri.toUpperCase()}</span>
        <span class="badge badge-feed">${feedLabel}</span>
        ${inc.gang_hotspot?`<span class="gang-tag">⚠ GANG ZONE</span>`:""}
        ${inc.near_consulate?`<span class="consulate-tag">🏛 DIPLOMATIC</span>`:""}
        ${isNew?`<span class="new-tag">NEW</span>`:""}
        <span class="inc-time">${timeAgo(inc.created_at)}</span>
      </div>
      <div class="inc-title">${inc.title||"Incident"}</div>
      <div class="inc-loc">📍 ${inc.location||""}</div>
      ${inc.unit?`<div class="inc-unit">Unit: ${inc.unit}</div>`:""}
      ${inc.district?`<div class="inc-unit" style="color:var(--boston)">${
        Object.entries(BPD_DISTRICTS).find(([k])=>inc.district?.toUpperCase().includes(k))?.[1]?.name
        || inc.district
      }</div>`:""}
      ${inc.gang_hotspot?`<div class="inc-gang-zone">⚠ ${inc.gang_zone}</div>`:""}
      ${inc.near_consulate?`<div class="inc-consulate">🏛 Near ${inc.consulate_country} Consulate</div>`:""}
    </div>`;
  }).join("");

  document.querySelectorAll(".incident[data-id]").forEach(el=>{
    el.addEventListener("click",()=>selectIncident(el.dataset.id));
  });
  syncMarkers(visible);
}

function syncMarkers(visible){
  const ids=new Set(visible.map(i=>i.id));
  Object.keys(S.markers).forEach(id=>{
    if(!ids.has(id)){S.map.removeLayer(S.markers[id]);delete S.markers[id];}
  });
  visible.forEach(inc=>{
    if(!inc.lat||!inc.lng) return;
    const sel=inc.id===S.selectedId;
    const icon=makePin(inc.priority,sel,inc.gang_hotspot,inc.near_consulate);
    if(S.markers[inc.id]){
      S.markers[inc.id].setIcon(icon);
    } else {
      const m=L.marker([inc.lat,inc.lng],{icon}).addTo(S.map);
      const pri=inc.priority||"p3";
      const badgeCss=pri==="p1"?`background:var(--red-dim);color:var(--red);border:1px solid var(--red-bdr)`:
                     pri==="p2"?`background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-bdr)`:
                     pri==="medical"?`background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bdr)`:
                     `background:rgba(107,125,150,0.12);color:#6b7d96;border:1px solid rgba(107,125,150,0.25)`;
      m.bindPopup(`<div style="font-family:'Space Grotesk',sans-serif;min-width:200px">
        <span class="p-badge" style="${badgeCss}">${PRIORITY_LABELS[pri]||pri.toUpperCase()}</span>
        <div class="p-title">${inc.title||"Incident"}</div>
        <div class="p-row">📍 <b>${inc.location||""}</b></div>
        <div class="p-row">📡 <b>${inc.feed||FEED_LABELS[inc.city]||""}</b></div>
        ${inc.unit?`<div class="p-row">Unit: <b>${inc.unit}</b></div>`:""}
        ${inc.gang_hotspot?`<div class="p-gang">⚠ ${inc.gang_zone}</div>`:""}
        ${inc.near_consulate?`<div class="p-consulate">🏛 Near ${inc.consulate_country} Consulate</div>`:""}
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${timeAgo(inc.created_at)}</div>
      </div>`);
      m.on("click",()=>selectIncident(inc.id));
      S.markers[inc.id]=m;
    }
  });
}

function selectIncident(id){
  S.selectedId=id;
  const inc=S.incidents.find(i=>i.id===id);
  if(inc?.lat&&inc?.lng){
    S.map.flyTo([inc.lat,inc.lng],16,{animate:true,duration:0.6});
    S.markers[id]?.openPopup();
  }
  render();
  // Scroll to card
  setTimeout(()=>{
    const el=document.querySelector(`.incident[data-id="${id}"]`);
    el?.scrollIntoView({behavior:"smooth",block:"nearest"});
  },100);
}

function updateStats(){
  const all=S.incidents;
  document.getElementById("stat-total").innerHTML=`<b>${all.length}</b> total`;
  document.getElementById("stat-p1").innerHTML=`<b>${all.filter(i=>i.priority==="p1").length}</b> p1`;
  document.getElementById("stat-med").innerHTML=`<b>${all.filter(i=>i.priority==="medical").length}</b> med`;
}

document.getElementById("heatmap-btn").addEventListener("click",async()=>{

async function doSearch(){
  const q=document.getElementById("addr-input").value.trim();
  if(!q) return;
  try {
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q+", Boston Massachusetts")}&limit=1`);
    const res=await r.json();
    if(!res.length){alert("Location not found");return;}
    const {lat,lon,display_name}=res[0];
    S.searchCenter=[parseFloat(lat),parseFloat(lon)];
    if(S.searchCircle) S.map.removeLayer(S.searchCircle);
    if(S.searchMarker) S.map.removeLayer(S.searchMarker);
    S.searchCircle=L.circle(S.searchCenter,{radius:8047,color:"var(--gold)",fillOpacity:0.05,weight:1.5}).addTo(S.map);
    S.searchMarker=L.marker(S.searchCenter,{icon:L.divIcon({
      className:"",
      html:`<div style="width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid #fff;box-shadow:0 0 8px rgba(245,200,66,0.6);"></div>`,
      iconSize:[12,12],iconAnchor:[6,6]

    S.map.flyTo(S.searchCenter,14);
    document.getElementById("clear-btn").classList.add("visible");
    document.getElementById("radius-status").textContent=`5mi radius around ${display_name.split(",")[0]}`;
    document.getElementById("radius-status").classList.add("visible");
    render();
  } catch(e){console.error(e);}
}

let lastPoll=new Date(Date.now()-3600000).toISOString();
async function poll(){
  try {
    const rows=await SB.query(`${TABLE}?select=*&order=created_at.desc&created_at=gt.${lastPoll}&limit=50`);
    if(rows.length){
      rows.forEach(r=>{
        r.lat=parseFloat(r.lat);r.lng=parseFloat(r.lng);
        if(!S.incidents.find(i=>i.id===r.id)){
          S.incidents.unshift(r);
          S.newIds.add(r.id);
          setTimeout(()=>{S.newIds.delete(r.id);render();},5000);
          showToast(r);
        }
      });
      lastPoll=rows[0].created_at;
      if(S.incidents.length>500) S.incidents=S.incidents.slice(0,500);
      render();
    }
  } catch(e){console.log("[Poll]",e.message);}
}

// ── BROWSER BPD RELAY ────────────────────────────────────────────────────────
const RELAY_URL   = "https://hoodbrief-boston-hood-brief-boston-production.up.railway.app/bpd-audio";
const BPD_CHANNELS = {
  "67b4a94bf07fc8198abc429a": "BPD CH2 Area A",
  "67ffbacc750036ae85e7c395": "BPD CH3 Roxbury/Mattapan",
  "67ffbaf8cd281dea86c07f70": "BPD CH4 West Roxbury",
  "67ffbb16cd281dea86c07f71": "BPD CH5 Back Bay",
  "67ffbb30f14dc59c46716089": "BPD CH6 South Boston/Dorchester",
  "67b4a918f07fc8198abc4299": "BPD CH1 Special Event",
};
const SCAN_URL = "wss://radio.rapidsos.com/bff/ws/689bb05ee75d9bc528e81c79";

let monitorActive = false;
let monitorSockets = [];
let audioCtx = null;

function updateMonitorStatus(msg){
  const el = document.getElementById("monitor-status");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

async function decodeAndRelay(frames, channelLabel){
  if(!frames.length) return;
  // Concatenate all binary frames
  const total = frames.reduce((s,f) => s + f.byteLength, 0);
  const combined = new Uint8Array(total);
  let offset = 0;
  for(const f of frames){ combined.set(new Uint8Array(f), offset); offset += f.byteLength; }

  // Decode with Web Audio API
  if(!audioCtx) audioCtx = new AudioContext({sampleRate: 16000});
  try {
    const decoded = await audioCtx.decodeAudioData(combined.buffer.slice(0));
    // Convert to 16-bit PCM WAV
    const pcm = decoded.getChannelData(0);
    const wav = encodeWAV(pcm, decoded.sampleRate);
    // POST to Railway
    const resp = await fetch(RELAY_URL, {
      method: "POST",
      headers: {
        "Content-Type": "audio/wav",
        "X-Relay-Secret": "hoodbrief",
        "X-Channel-Label": channelLabel,
        "X-Source": "browser",
      },
      body: wav,
    });
    updateMonitorStatus(`📡 Sent ${Math.round(wav.byteLength/1024)}KB from ${channelLabel} → ${resp.status}`);
    console.log(`[BPD Browser Relay] ${channelLabel}: ${resp.status}`);
  } catch(e){
    console.log(`[BPD Browser Relay] Decode error: ${e.message}`);
  }
}

function encodeWAV(samples, sampleRate){
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buf);
  const writeStr = (o,s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
  writeStr(0,"RIFF");
  view.setUint32(4, 36 + samples.length*2, true);
  writeStr(8,"WAVE");
  writeStr(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeStr(36,"data");
  view.setUint32(40,samples.length*2,true);
  let o = 44;
  for(let i=0;i<samples.length;i++){
    const s = Math.max(-1,Math.min(1,samples[i]));
    view.setInt16(o, s<0?s*0x8000:s*0x7FFF, true);
    o += 2;
  }
  return buf;
}

function startMonitor(){
  monitorActive = true;
  document.getElementById("monitor-btn").classList.add("active");
  document.getElementById("monitor-btn").textContent = "📡 Live";
  updateMonitorStatus("Connecting to BPD feeds...");

  // Connect to BPD SCAN (all channels)
  const ws = new WebSocket(SCAN_URL);
  let frames = [];
  let currentChannel = "BPD — All Districts";
  let transmitting = false;

  ws.onopen = () => {
    updateMonitorStatus("✅ Connected to BPD — collecting audio...");
    // Send heartbeat
    setInterval(() => {
      if(ws.readyState === 1) ws.send(JSON.stringify({action:"heartbeat"}));
    }, 10000);
  };

  ws.onmessage = async (e) => {
    if(typeof e.data === "string"){
      try {
        const msg = JSON.parse(e.data);
        if(msg.action === "tx_start"){
          frames = [];
          transmitting = true;
          currentChannel = BPD_CHANNELS[msg.channelId] || "BPD — All Districts";
          updateMonitorStatus(`📻 ${currentChannel} transmitting...`);
        } else if(msg.action === "tx_end"){
          transmitting = false;
          if(frames.length > 3){
            updateMonitorStatus(`⬆ Relaying ${frames.length} frames from ${currentChannel}...`);
            await decodeAndRelay([...frames], currentChannel);
          }
          frames = [];
        }
      } catch{}
    } else if(e.data instanceof ArrayBuffer || e.data instanceof Blob){
      const buf = e.data instanceof Blob ? await e.data.arrayBuffer() : e.data;
      if(transmitting) frames.push(buf);
    }
  };

  ws.onerror = () => updateMonitorStatus("❌ Connection error — retrying...");
  ws.onclose = () => {
    if(monitorActive) setTimeout(startMonitor, 3000);
  };
  monitorSockets.push(ws);
}

function stopMonitor(){
  monitorActive = false;
  monitorSockets.forEach(ws => ws.close());
  monitorSockets = [];
  document.getElementById("monitor-btn").classList.remove("active");
  document.getElementById("monitor-btn").textContent = "📡 Monitor";
  updateMonitorStatus("");
}

document.getElementById("monitor-btn").addEventListener("click", () => {
  if(monitorActive) stopMonitor();
  else startMonitor();
});

async function loadDistrictBoundaries(){
  // Load GeoJSON from Analyze Boston
  try {
    const resp = await fetch(
      "https://raw.githubusercontent.com/hoodbrief/hoodbrief-boston-hood-brief-boston/main/police_districts.geojson"
    );
    if(!resp.ok) throw new Error("GeoJSON unavailable");
    const geojson = await resp.json();
    if(geojson.features?.length){
      L.geoJSON(geojson, {
        style: feature => {
          const d = (feature.properties.DISTRICT || feature.properties.ID || "").trim();
          const info = BPD_DISTRICTS[d] || {};
          return {
            color: info.color || "#ffffff",
            weight: 1.5,
            opacity: 0.7,
            fillOpacity: 0.04,
            fillColor: info.color || "#ffffff",
          };
        },
        onEachFeature: (feature, layer) => {
          const d = (feature.properties.DISTRICT || feature.properties.ID || "").trim();
          const info = BPD_DISTRICTS[d] || {name: d};
          layer.bindTooltip(info.name, {permanent:false, direction:"center",
            className:"district-tooltip"});
        }
      }).addTo(S.map);
      console.log(`[Districts] ${geojson.features.length} district boundaries loaded`);
      return;
    }
  } catch(e){ console.log("[Districts] GeoJSON fetch failed:", e.message); }

  // Fallback: label markers only
  Object.entries(BPD_DISTRICTS).forEach(([code, d]) => {
    L.marker(d.center, {icon: L.divIcon({
      className:"",
      html:`<div style="font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
                        color:${d.color};background:rgba(6,8,15,0.7);
                        border:1px solid ${d.color}40;padding:2px 5px;border-radius:2px;
                        white-space:nowrap;pointer-events:none;">${code}</div>`,
      iconSize:[null,null], iconAnchor:[0,0]
    })}).addTo(S.map);
  });
  console.log("[Districts] Fallback labels added");
}

function loadStationMarkers(){
  BPD_STATIONS.forEach(st => {
    const d = BPD_DISTRICTS[st.district] || {};
    const color = d.color || "#94a3b8";
    const icon = L.divIcon({
      className:"",
      html:`<div style="width:10px;height:10px;background:${color};
                        border:2px solid rgba(255,255,255,0.8);border-radius:2px;
                        box-shadow:0 0 6px ${color}80;transform:rotate(45deg)"></div>`,
      iconSize:[10,10], iconAnchor:[5,5]
    });
    const m = L.marker([st.lat, st.lng], {icon, zIndexOffset:-50}).addTo(S.map);
    m.bindPopup(`
      <div style="font-family:'Space Grotesk',sans-serif;min-width:180px">
        <div style="font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
                    color:${color};letter-spacing:1px;margin-bottom:5px">
          🚔 BPD DISTRICT ${st.district}
        </div>
        <div style="font-weight:600;font-size:13px;margin-bottom:4px">${st.name}</div>
        <div style="color:var(--text2);font-size:11px">📍 ${st.address}</div>
      </div>`);
  });
  console.log(`[Stations] ${BPD_STATIONS.length} station markers added`);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
async function boot(){
  initMap();
  await loadDistrictBoundaries();
  loadStationMarkers();
  await loadConsulateMarkers();
  try {
    const rows=await SB.query(`${TABLE}?select=*&order=created_at.desc&limit=200`);
    S.incidents=rows.map(r=>({...r,lat:parseFloat(r.lat),lng:parseFloat(r.lng)}));
    document.getElementById("boot-overlay").style.display="none";
    render();
    SB.subscribe(row=>{
      row.lat=parseFloat(row.lat);row.lng=parseFloat(row.lng);
      if(!S.incidents.find(i=>i.id===row.id)){
        S.incidents.unshift(row);
        S.newIds.add(row.id);
        setTimeout(()=>{S.newIds.delete(row.id);render();},5000);
        showToast(row);
        if(S.incidents.length>500) S.incidents=S.incidents.slice(0,500);
        render();
      }
    });
    setTimeout(poll,15000);
  } catch(err){
    document.getElementById("boot-msg").textContent=err.message;
  }
}
boot();
